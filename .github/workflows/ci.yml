name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  test-r:
    name: R Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup R
        id: setup-r
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: release
          use-public-rspm: true

      - name: Install system dependencies
        run: sudo apt-get install -y libicu-dev libcurl4-openssl-dev libssl-dev

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-${{ hashFiles('scripts/**/*.R') }}
          restore-keys: |
            ${{ runner.os }}-r-${{ steps.setup-r.outputs.installed-r-version }}-
            ${{ runner.os }}-r-

      - name: Install R packages
        shell: Rscript {0}
        run: |
          pkgs <- c("data.table", "qqman", "optparse", "R.utils",
                    "ggplot2", "rjson", "stringi", "ggpubr")
          missing <- pkgs[!pkgs %in% installed.packages()[, "Package"]]
          if (length(missing) > 0) {
            install.packages(missing, repos = "https://cloud.r-project.org")
          }

      - name: Run R tests
        run: cd scripts/tests && Rscript run_all_tests.R

  test-python:
    name: Python Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'
          cache: pip
          cache-dependency-path: scripts/tests/requirements.txt

      - name: Install Python packages
        run: pip install -r scripts/tests/requirements.txt

      - name: Run Python tests
        run: cd scripts/tests && python3 -m unittest discover -s . -p "test_*.py" -v
